name: Dashboard CI
on:
  push:
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'
      - run: cd dashboard && npm ci && npm run build
